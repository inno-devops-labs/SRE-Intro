# In-cluster Locust runner for Lab 10 load testing.
#
# Why in-cluster: `kubectl port-forward svc/gateway` only targets ONE pod
# (it's session-sticky to the first endpoint it picks). To load-test all
# 5 gateway replicas through kube-proxy, the load generator itself has to
# live inside the cluster and hit the Service DNS name.
#
# Usage:
#   # 1. Apply this file (creates the ConfigMap with locustfile.py + the Job shell)
#   kubectl apply -f labs/lab10/locust-runner.yaml
#
#   # 2. For each run, override the user count / duration with a patch:
#   kubectl create job --from=job/locust-template  load-10 --dry-run=client -o yaml \
#     | sed 's/USERS/10/; s/RATE/2/; s/TIME/60s/' \
#     | kubectl apply -f -
#
# Easier: just edit the env values below and `kubectl apply` for each level.

apiVersion: v1
kind: ConfigMap
metadata:
  name: locustfile
data:
  locustfile.py: |
    from locust import HttpUser, task, between

    class QuickTicketUser(HttpUser):
        wait_time = between(0.5, 2.0)

        @task(7)
        def list_events(self):
            self.client.get("/events")

        @task(2)
        def reserve(self):
            # event 3 has 500 tickets — enough headroom for a minute of load
            self.client.post(
                "/events/3/reserve",
                json={"quantity": 1},
                headers={"Content-Type": "application/json"},
            )

        @task(1)
        def health(self):
            self.client.get("/health")
