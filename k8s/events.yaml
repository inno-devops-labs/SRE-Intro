apiVersion: apps/v1
kind: Deployment
metadata:
  name: events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events
  template:
    metadata:
      labels:
        app: events
    spec:
      containers:
        - name: events
          image: ghcr.io/inno-devops-labs/quickticket-events:bffba819763445b07e27826da9fab8eac1af95c9
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ghcr-secret
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "quickticket"
            - name: DB_USER
              value: "quickticket"
            - name: DB_PASS
              value: "quickticket"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: events
spec:
  selector:
    app: events
  ports:
    - port: 8081
      targetPort: 8081
